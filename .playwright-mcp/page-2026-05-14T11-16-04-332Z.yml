                - text: incremental_strategy='merge'
              - generic [ref=e200]:
                - link:
                  - /url: http://127.0.0.1:8000/feature-comparison/#__codelineno-1-5
                - text: ") }}"
              - generic [ref=e201]:
                - link:
                  - /url: http://127.0.0.1:8000/feature-comparison/#__codelineno-1-6
              - generic [ref=e202]:
                - link:
                  - /url: http://127.0.0.1:8000/feature-comparison/#__codelineno-1-7
                - text: select * from source('my_source', 'my_table')
              - generic [ref=e203]:
                - link:
                  - /url: http://127.0.0.1:8000/feature-comparison/#__codelineno-1-8
                - text: "{% if is_incremental() %}"
              - generic [ref=e204]:
                - link:
                  - /url: http://127.0.0.1:8000/feature-comparison/#__codelineno-1-9
                - text: "where updated_at > (select max(updated_at) from {{ this }})"
              - generic [ref=e205]:
                - link:
                  - /url: http://127.0.0.1:8000/feature-comparison/#__codelineno-1-10
                - text: "{% endif %}"
          - paragraph [ref=e206]:
            - text: When using the
            - code [ref=e207]: merge
            - text: strategy, dbt will generate a
            - code [ref=e208]: MERGE
            - text: statement that matches on the
            - code [ref=e209]: unique_key
            - text: and updates existing records or inserts new records as necessary. The
            - code [ref=e210]: unique_key
            - text: can be a single column or a list of columns.
          - paragraph [ref=e211]:
            - text: The adapter will use the
            - code [ref=e212]: merge
            - text: strategy by default if a
            - code [ref=e213]: unique_key
            - text: is provided and no
            - code [ref=e214]: incremental_strategy
            - text: is specified.
          - paragraph [ref=e215]: "This also works for microbatch models:"
          - generic [ref=e217]:
            - navigation [ref=e218]:
              - button "Toggle line selection" [ref=e219] [cursor=pointer]
              - button "Copy to clipboard" [ref=e220] [cursor=pointer]
            - code [ref=e221]:
              - generic [ref=e222]:
                - link:
