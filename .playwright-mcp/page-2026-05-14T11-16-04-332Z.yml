          - heading "Better support for warehouse snapshots ¶" [level=2] [ref=e233]:
            - text: Better support for
            - link "warehouse snapshots" [ref=e234] [cursor=pointer]:
              - /url: http://127.0.0.1:8000/warehouse-snapshots/
            - link "¶" [ref=e235] [cursor=pointer]:
              - /url: http://127.0.0.1:8000/feature-comparison/#better-support-for-warehouse-snapshots
          - paragraph [ref=e236]:
            - text: Both adapters support Fabric
            - link "warehouse snapshots" [ref=e237] [cursor=pointer]:
              - /url: https://learn.microsoft.com/fabric/data-warehouse/warehouse-snapshot?WT.mc_id=MVP_310840
            - text: ", but Microsoft's implementation hijacks Python runtime components and does not respect the proper dbt lifecycle. This adapter exposes a macro you can call from"
            - code [ref=e238]: on-run-start
            - text: ","
            - code [ref=e239]: on-run-end
            - text: ","
            - code [ref=e240]: post-hook
            - text: ", or any other Jinja context — giving you full control over when and how often snapshots are taken."
          - heading "Support for dbt-external-tables ¶" [level=2] [ref=e241]:
            - text: Support for dbt-external-tables
            - link "¶" [ref=e242] [cursor=pointer]:
              - /url: http://127.0.0.1:8000/feature-comparison/#support-for-dbt-external-tables
          - paragraph [ref=e243]:
            - text: This adapter provides
            - link "dbt-external-tables" [ref=e244] [cursor=pointer]:
              - /url: https://github.com/dbt-labs/dbt-external-tables
            - text: compatibility macros that use Fabric's
            - code [ref=e245]: OPENROWSET(BULK ...)
            - text: function to query Parquet, CSV, and JSONL files stored in Azure Blob Storage, ADLS, or OneLake. External sources are created as views wrapping OPENROWSET queries, so data is always fresh. See the
            - link "external tables guide" [ref=e246] [cursor=pointer]:
              - /url: http://127.0.0.1:8000/external-tables/
            - text: for details.
          - heading "Microsoft Purview integration ¶" [level=2] [ref=e247]:
            - link "Microsoft Purview integration" [ref=e248] [cursor=pointer]:
              - /url: http://127.0.0.1:8000/purview-integration/
            - link "¶" [ref=e249] [cursor=pointer]:
              - /url: http://127.0.0.1:8000/feature-comparison/#microsoft-purview-integration
          - paragraph [ref=e250]:
            - text: This adapter can automatically sync dbt metadata to
            - link "Microsoft Purview Data Catalog" [ref=e251] [cursor=pointer]:
              - /url: https://learn.microsoft.com/en-us/purview/
            - text: ". Purview's built-in Fabric scanner discovers items and table schemas, but does not populate descriptions, business metadata, or table-level lineage. This integration fills those gaps:"
          - list [ref=e252]:
            - listitem [ref=e253]:
              - strong [ref=e254]: Descriptions
              - text: ": model and column descriptions from your dbt YAML files are pushed to Purview automatically after every run."
            - listitem [ref=e255]:
              - strong [ref=e256]: Business metadata
              - text: ": dbt tags, materialization type, test names, test results, custom meta, and sync timestamps are attached to table entities via a custom"
              - code [ref=e257]: dbt_metadata
              - text: business metadata type.
            - listitem [ref=e258]:
              - strong [ref=e259]: Table-level lineage
              - text: ": a full lineage graph based on dbt's"
              - code [ref=e260]: ref()
              - text: and
              - code [ref=e261]: source()
              - text: dependencies is created in Purview. The built-in scanner only provides item-level lineage (e.g., Lakehouse → Notebook → Lakehouse) and
              - link "does not support sub-item lineage" [ref=e262] [cursor=pointer]:
                - /url: https://learn.microsoft.com/en-us/purview/data-map-lineage-fabric
              - text: .
          - paragraph [ref=e263]:
            - text: The sync runs via
            - code [ref=e264]: "{{ purview_sync() }}"
            - text: as an
            - code [ref=e265]: on-run-end
            - text: hook or as a manual
            - code [ref=e266]: dbt run-operation
            - text: .
          - heading "Catalog statistics ¶" [level=2] [ref=e267]:
            - link "Catalog statistics" [ref=e268] [cursor=pointer]:
              - /url: http://127.0.0.1:8000/catalog-stats/
            - link "¶" [ref=e269] [cursor=pointer]:
              - /url: http://127.0.0.1:8000/feature-comparison/#catalog-statistics
          - paragraph [ref=e270]:
            - text: When you run
            - code [ref=e271]: dbt docs generate
            - text: ", this adapter includes"
            - strong [ref=e272]: approximate row counts
            - text: for every table in the catalog output. Microsoft's upstream adapter does not include any statistics — the dbt docs site shows no table size information. With this adapter, table sizes are visible out of the box, with no extra configuration.
          - heading "Better support for popular packages ¶" [level=2] [ref=e273]:
            - text: Better support for popular packages
            - link "¶" [ref=e274] [cursor=pointer]:
              - /url: http://127.0.0.1:8000/feature-comparison/#better-support-for-popular-packages
          - paragraph [ref=e275]:
            - link "dbt-utils" [ref=e276] [cursor=pointer]:
              - /url: https://hub.getdbt.com/dbt-labs/dbt_utils/latest/
            - text: is already fully supported and more packages are being tested and added.
          - heading "Plenty of bugfixes ¶" [level=2] [ref=e277]:
            - text: Plenty of bugfixes
