                - text: materialized='incremental',
              - generic [ref=e224]:
                - link:
                  - /url: http://127.0.0.1:8000/feature-comparison/#__codelineno-2-3
                - text: unique_key='id',
              - generic [ref=e225]:
                - link:
                  - /url: http://127.0.0.1:8000/feature-comparison/#__codelineno-2-4
                - text: incremental_strategy='microbatch',
              - generic [ref=e226]:
