        - article [ref=e127]:
          - link "Edit this page" [ref=e128] [cursor=pointer]:
            - /url: https://github.com/sdebruyn/dbt-fabric/edit/main/docs/feature-comparison.md
            - img [ref=e129]
          - heading "Comparison between dbt-fabric and dbt-fabric-samdebruyn ¶" [level=1] [ref=e132]:
            - text: Comparison between dbt-fabric and dbt-fabric-samdebruyn
            - link "¶" [ref=e133] [cursor=pointer]:
              - /url: http://127.0.0.1:8000/feature-comparison/#comparison-between-dbt-fabric-and-dbt-fabric-samdebruyn
          - paragraph [ref=e134]:
            - text: This adapter has all the features of
            - link "Microsoft's dbt-fabric adapter" [ref=e135] [cursor=pointer]:
              - /url: https://github.com/microsoft/dbt-fabric
            - text: ", plus some additional features. The following features are exclusive to dbt-fabric-samdebruyn:"
          - heading "dbt Core 1.11 support ¶" [level=2] [ref=e136]:
            - text: dbt Core 1.11 support
            - link "¶" [ref=e137] [cursor=pointer]:
              - /url: http://127.0.0.1:8000/feature-comparison/#dbt-core-111-support
          - paragraph [ref=e138]: This adapter is compatible with dbt Core 1.11, while Microsoft's dbt-fabric adapter is only compatible with dbt Core 1.10.
          - heading "Functions in dbt ¶" [level=2] [ref=e139]:
            - text: Functions in dbt
            - link "¶" [ref=e140] [cursor=pointer]:
              - /url: http://127.0.0.1:8000/feature-comparison/#functions-in-dbt
          - paragraph [ref=e141]: This adapter supports creating scalar functions as introduced in dbt Core 1.11, while Microsoft's dbt-fabric does not.
          - heading "Support for Python models ¶" [level=2] [ref=e142]:
            - text: Support for Python models
            - link "¶" [ref=e143] [cursor=pointer]:
              - /url: http://127.0.0.1:8000/feature-comparison/#support-for-python-models
          - paragraph [ref=e144]:
            - text: This adapter supports
            - link "Python models" [ref=e145] [cursor=pointer]:
              - /url: https://docs.getdbt.com/docs/build/python-models
            - text: . To use this, just add information about your
            - link "Fabric Workspace" [ref=e146] [cursor=pointer]:
              - /url: http://127.0.0.1:8000/configuration/#workspace_name
            - text: and
            - link "Lakehouse" [ref=e147] [cursor=pointer]:
              - /url: http://127.0.0.1:8000/configuration/#lakehouse
            - text: to the
            - code [ref=e148]: profiles.yml
            - text: file.
          - heading "Automatically find the host name of your Fabric Workspace ¶" [level=2] [ref=e149]:
            - text: Automatically find the host name of your Fabric Workspace
            - link "¶" [ref=e150] [cursor=pointer]:
              - /url: http://127.0.0.1:8000/feature-comparison/#automatically-find-the-host-name-of-your-fabric-workspace
          - paragraph [ref=e151]: It can be tedious to find the correct host name for your Fabric Workspace, especially if you have separate Workspaces for development and production environments.
          - paragraph [ref=e152]:
            - text: This adapter will automatically retrieve the host name for your Fabric Workspace, based on the
            - link "workspace_name" [ref=e153] [cursor=pointer]:
              - /url: http://127.0.0.1:8000/configuration/#workspace_name
              - code [ref=e154]: workspace_name
            - text: or
            - link "workspace_id" [ref=e155] [cursor=pointer]:
              - /url: http://127.0.0.1:8000/configuration/#workspace_id
              - code [ref=e156]: workspace_id
            - text: provided in the configuration.
          - paragraph [ref=e157]: "This allows you to write a configuration like this:"
          - generic [ref=e159]:
            - navigation [ref=e160]:
              - button "Toggle line selection" [ref=e161] [cursor=pointer]
              - button "Copy to clipboard" [ref=e162] [cursor=pointer]
            - code [ref=e163]:
              - generic [ref=e164]:
                - link:
                  - /url: http://127.0.0.1:8000/feature-comparison/#__codelineno-0-1
                - text: "default:"
              - generic [ref=e165]:
                - link:
                  - /url: http://127.0.0.1:8000/feature-comparison/#__codelineno-0-2
                - text: "target: dev"
              - generic [ref=e166]:
                - link:
                  - /url: http://127.0.0.1:8000/feature-comparison/#__codelineno-0-3
                - text: "outputs:"
              - generic [ref=e167]:
                - link:
                  - /url: http://127.0.0.1:8000/feature-comparison/#__codelineno-0-4
                - text: "dev:"
              - generic [ref=e168]:
                - link:
                  - /url: http://127.0.0.1:8000/feature-comparison/#__codelineno-0-5
                - text: "type: fabric"
              - generic [ref=e169]:
                - link:
                  - /url: http://127.0.0.1:8000/feature-comparison/#__codelineno-0-6
                - text: "workspace: \"gold_{{ env_var('FABRIC_ENV', 'dev') }}\""
              - generic [ref=e170]:
                - link:
                  - /url: http://127.0.0.1:8000/feature-comparison/#__codelineno-0-7
                - text: "database: dwh"
              - generic [ref=e171]:
                - link:
                  - /url: http://127.0.0.1:8000/feature-comparison/#__codelineno-0-8
                - text: "schema: dbt"
          - paragraph [ref=e172]:
            - text: Then, to run dbt against your production environment/Workspace, you can simply set the
            - code [ref=e173]: FABRIC_ENV
            - text: environment variable to
            - code [ref=e174]: prod
            - text: (if your Workspaces are named accordingly).
          - heading "Extended support for authentication methods ¶" [level=2] [ref=e175]:
            - text: Extended support for
            - link "authentication methods" [ref=e176] [cursor=pointer]:
              - /url: http://127.0.0.1:8000/configuration/#authentication
            - link "¶" [ref=e177] [cursor=pointer]:
              - /url: http://127.0.0.1:8000/feature-comparison/#extended-support-for-authentication-methods
          - paragraph [ref=e178]: While most authentication methods have been contributed back to dbt-fabric, some newer options are only available in this adapter.
          - heading "MERGE in incremental and microbatch models ¶" [level=2] [ref=e179]:
            - text: MERGE in incremental and microbatch models
            - link "¶" [ref=e180] [cursor=pointer]:
              - /url: http://127.0.0.1:8000/feature-comparison/#merge-in-incremental-and-microbatch-models
          - generic [ref=e181]:
            - paragraph [ref=e182]: Info
            - paragraph [ref=e183]: MERGE has recently been added in Microsoft's version as well.
          - paragraph [ref=e184]:
            - text: Incremental models in dbt-fabric support the
            - code [ref=e185]: append
            - text: ","
            - code [ref=e186]: insert_overwrite
            - text: ", and"
            - code [ref=e187]: delete+insert
            - text: strategies.
          - paragraph [ref=e188]:
            - text: This adapter adds support for
            - link "MERGE" [ref=e189] [cursor=pointer]:
              - /url: https://learn.microsoft.com/sql/t-sql/statements/merge-transact-sql?view=sql-server-ver17&WT.mc_id=MVP_310840
            - text: .
          - generic [ref=e191]:
            - navigation [ref=e192]:
              - button "Toggle line selection" [ref=e193] [cursor=pointer]
              - button "Copy to clipboard" [ref=e194] [cursor=pointer]
            - code [ref=e195]:
              - generic [ref=e196]:
                - link:
                  - /url: http://127.0.0.1:8000/feature-comparison/#__codelineno-1-1
                - text: "{{ config("
              - generic [ref=e197]:
                - link:
                  - /url: http://127.0.0.1:8000/feature-comparison/#__codelineno-1-2
                - text: materialized='incremental',
              - generic [ref=e198]:
