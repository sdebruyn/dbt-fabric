          - heading "Microsoft Purview integration ¶" [level=1] [ref=e136]:
            - text: Microsoft Purview integration
            - link "¶" [ref=e137] [cursor=pointer]:
              - /url: http://127.0.0.1:8000/purview-integration/#microsoft-purview-integration
          - paragraph [ref=e138]:
            - text: This adapter can sync dbt metadata to
            - link "Microsoft Purview Data Catalog" [ref=e139] [cursor=pointer]:
              - /url: https://learn.microsoft.com/en-us/purview/
            - text: ", enriching your existing scanned assets with descriptions, business metadata, and lineage from your dbt project."
          - heading "Why this integration ¶" [level=2] [ref=e140]:
            - text: Why this integration
            - link "¶" [ref=e141] [cursor=pointer]:
              - /url: http://127.0.0.1:8000/purview-integration/#why-this-integration
          - paragraph [ref=e142]:
            - text: Microsoft Purview has a
            - link "built-in integration with Microsoft Fabric" [ref=e143] [cursor=pointer]:
              - /url: https://learn.microsoft.com/en-us/fabric/governance/microsoft-purview-fabric
            - text: "that scans your Fabric workspace and discovers items like Warehouses, Lakehouses, Notebooks, and Pipelines. However, this built-in scanner has significant limitations when it comes to the metadata that dbt users care about:"
          - table [ref=e146]:
            - rowgroup [ref=e147]:
              - row "Capability Built-in Purview scanner dbt Purview sync" [ref=e148]:
                - columnheader "Capability" [ref=e149]
                - columnheader "Built-in Purview scanner" [ref=e150]
                - columnheader "dbt Purview sync" [ref=e151]
            - rowgroup [ref=e152]:
              - row "Table discovery Lakehouse tables only (preview). Data Warehouse tables are not scanned as sub-items. Works with any table entity already in Purview, regardless of how it was discovered." [ref=e153]:
                - cell "Table discovery" [ref=e154]:
                  - strong [ref=e155]: Table discovery
                - cell "Lakehouse tables only (preview). Data Warehouse tables are not scanned as sub-items." [ref=e156]:
