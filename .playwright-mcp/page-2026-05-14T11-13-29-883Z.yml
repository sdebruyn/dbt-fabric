          - paragraph [ref=e244]:
            - text: The Purview integration reuses the same authentication method configured for your Fabric connection. No additional authentication setup is needed. The identity must have
            - strong [ref=e245]: Data Curator
            - text: and
            - strong [ref=e246]: Data Reader
            - text: roles in the Purview account's root collection.
          - paragraph [ref=e247]:
            - text: All
