          - paragraph [ref=e197]:
            - text: "In short: the built-in scanner discovers"
            - emphasis [ref=e198]: what exists
            - text: "in Fabric (table names, column schemas). This dbt integration adds the context that the scanner cannot provide:"
            - emphasis [ref=e199]: what each table means
            - text: (descriptions),
            - emphasis [ref=e200]: how tables relate to each other
            - text: (lineage), and
            - emphasis [ref=e201]: what guarantees are in place
            - text: (tests, tags, metadata).
          - paragraph [ref=e202]: The two are complementary — the scanner creates the entities in Purview, and the dbt sync enriches them.
          - heading "How it works ¶" [level=2] [ref=e203]:
            - text: How it works
            - link "¶" [ref=e204] [cursor=pointer]:
              - /url: http://127.0.0.1:8000/purview-integration/#how-it-works
          - paragraph [ref=e205]: "When Purview scans your Fabric workspace, it discovers tables and views but doesn't know about the rich metadata in your dbt project: model descriptions, column documentation, tests, tags, and lineage. The Purview sync bridges this gap by:"
          - list [ref=e206]:
            - listitem [ref=e207]:
              - strong [ref=e208]: Matching
              - text: each dbt model to its corresponding Purview entity (table/view) via the Purview Discovery API
            - listitem [ref=e209]:
              - strong [ref=e210]: Enriching
              - text: the entity with dbt descriptions (on both tables and columns)
            - listitem [ref=e211]:
              - strong [ref=e212]: Adding business metadata
              - text: like dbt tags, materialization type, test results, and custom meta
            - listitem [ref=e213]:
              - strong [ref=e214]: Creating lineage
              - text: between tables using dbt's dependency graph
          - paragraph [ref=e215]:
            - text: The sync writes to
            - code [ref=e216]: userDescription
            - text: (not
            - code [ref=e217]: description
            - text: ), so it never overwrites metadata set by Purview scanners.
          - heading "Configuration ¶" [level=2] [ref=e218]:
            - text: Configuration
            - link "¶" [ref=e219] [cursor=pointer]:
              - /url: http://127.0.0.1:8000/purview-integration/#configuration
          - paragraph [ref=e220]:
            - text: Add the
            - code [ref=e221]: purview_endpoint
            - text: to your target in
            - code [ref=e222]: profiles.yml
            - text: ":"
