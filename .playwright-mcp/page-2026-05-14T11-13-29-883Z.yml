                  - text: in the Purview portal per table.
                - cell "Automatically pushed from dbt model YAML files after every run." [ref=e169]
              - row "Column descriptions Not populated. Must be manually entered per column. Automatically pushed from dbt column YAML files after every run." [ref=e170]:
                - cell "Column descriptions" [ref=e171]:
                  - strong [ref=e172]: Column descriptions
                - cell "Not populated. Must be manually entered per column." [ref=e173]
                - cell "Automatically pushed from dbt column YAML files after every run." [ref=e174]
              - row "Table-level lineage Not supported. The scanner only captures item-level lineage (e.g., Lakehouse → Notebook → Lakehouse), not which specific table was derived from which other tables. Full table-level lineage graph based on dbt's ref() and source() dependencies." [ref=e175]:
