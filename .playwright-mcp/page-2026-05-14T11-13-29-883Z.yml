              - row "Column discovery Lakehouse column names and data types (preview). N/A — works with columns already discovered by the scanner." [ref=e159]:
                - cell "Column discovery" [ref=e160]:
                  - strong [ref=e161]: Column discovery
                - cell "Lakehouse column names and data types (preview)." [ref=e162]
                - cell "N/A — works with columns already discovered by the scanner." [ref=e163]
              - row "Table descriptions Not populated. Must be manually entered in the Purview portal per table. Automatically pushed from dbt model YAML files after every run." [ref=e164]:
                - cell "Table descriptions" [ref=e165]:
                  - strong [ref=e166]: Table descriptions
